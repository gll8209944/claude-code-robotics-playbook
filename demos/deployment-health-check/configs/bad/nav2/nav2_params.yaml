# Nav2 参数（故意植入多处越界错误）

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0        # 危险：< 10Hz，越界
    max_vel_x: 5.0                  # 危险：> 1.5，机器人会飞车
    max_vel_theta: 4.0              # 危险：> 3.0
    min_vel_x: 0.0
    min_vel_theta: -4.0             # 危险：越界
    inflation_radius: 0.01          # 危险：< 0.15，路径会贴着障碍物
    cost_scaling_factor: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0  # 危险：< 10Hz
    max_vel_x: 5.0                      # 危险
    max_vel_theta: 4.0                 # 危险

bt_navigator:
  ros__parameters:
    use_sim_time: false
