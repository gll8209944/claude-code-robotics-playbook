amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_global_planner: navfn.NavfnRos
    base_local_planner: dwa_local_planner.DWAPlannerROS

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    max_vel_x: 0.5
    max_vel_theta: 1.0
    min_vel_x: 0.0
    min_vel_theta: -1.0
    max_vel_x_forward_only: 0.5
    max_vel_x_Limited: 0.5
    min_in_place_vel_theta: 0.5
    inflation_radius: 0.35
    cost_scaling_factor: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    max_vel_x: 0.5
    max_vel_theta: 1.0
    accel_lim_x: 1.0
    accel_lim_theta: 1.5
    decel_lim_x: -1.0
    decel_lim_theta: -1.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    bt_tree_filename: install/share/nav2_bt_navigator/behavior_tree_xml/dock.xml
